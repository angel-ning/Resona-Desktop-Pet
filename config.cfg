[OCR]
enabled = false
#是否启用OCR识别。会在每次LLM返回文本前，截取屏幕并识别其中的文字。
#会导致你的Token消耗量大幅增加，显著增大返回延迟与每次运行的成本。你知道我在说什么的，后果自负。
#某些情况下会导致你的预设prompt出现注意力涣散的问题。
#如果你将OCR启用情况下的所有日志发送给任何人，请确保没有泄露你的隐私信息。
#自行注册然后填写你的secret_id与secret_key。
vlm_enabled = false
#是否启用多模态模型。
#如果启用，每次提交question会将你的屏幕截图，发送给多模态模型。此项启用时OCR会被自动禁用。
#Token消耗量会大幅度增加，同时如果你试图给一个不支持多模态的大模型启用这个功能，你的API配额会被极速消耗。
#可能会造成隐私泄露等问题，启用后果自负。
provider = tencent
#tencent=腾讯云，baidu=百度智能云
include_process_list = false
#是否在每次Question发送前，带上你当前显示器正在渲染的程序的进程名与窗口标题。可以独立于OCR开启。
#会导致你的Token消耗量大幅增加，显著增大每次运行的成本。你知道我在说什么的，后果自负。
sentence_limit = 4
#如果设置为0，则不会发送“Keep your response under X sentences”的约束。此处数字决定约束为多少。
#通常来说只建议在启用OCR时打开，不启用OCR的话可能会导致注意力过度分配。
#可能完全没有用。取决于你使用的模型的效果和你的Prompt，不保证总是能起作用。
baidu_api_key = 
baidu_secret_key = 
#百度智能云控制台地址：https://console.bce.baidu.com/ai/#/ai/ocr/overview/index
tencent_secret_id = 
tencent_secret_key = 
#腾讯云控制台地址：https://console.cloud.tencent.com/ocr/general

[Timer]
# 定时任务调度器开关
enabled = false
# 轮询收件箱（inbox_file）的间隔（秒）
poll_interval = 0.5
# MCP 工具写入的收件箱文件路径（主程序从中读取并清空）
inbox_file = TEMP/timer_inbox.json
# 主程序内部维护的任务队列文件路径（持久化未完成任务）
tasks_file = TEMP/timer_tasks.json
# 是否在触发时间前提前合成语音（预加载），以实现零延迟触发
pre_synthesize = true
# 预合成前要求的 TTS 空闲时间（秒），防止打断正在进行的对话
tts_idle_sec = 2.0
# 任务就绪后的最小触发延迟（秒），用于平滑状态切换
trigger_delay = 2.0

[HTML]
# --- HTML服务器设置 ---
enabled = true
#是否启用HTML服务器。
host = 127.0.0.1
#监听地址。0.0.0.0表示允许局域网访问，127.0.0.1表示仅本机。
port = 8000
#监听端口。
static_dir = html
#静态文件目录（相对于项目根目录）。
upload_dir = TEMP/uploads
#上传文件临时存储目录。
max_connections = 10
#最大并发连接数。
session_timeout = 3600
#会话超时时间（秒）。


[ExternalAPI]
# --- 外部 WebSocket 服务设置 ---
# 此服务仅接受 JSON 格式的消息，例如: {"question": "你好"}
enabled = true
# 是否开启外部 WebSocket 服务。
host = 127.0.0.1
# 监听的主机地址。
port = 12345
# 如果桌宠正忙（思考/说话/录音），是否忽略外部输入的问题。
ignore_if_busy = true
# 是否向外部 WebSocket 客户端返回处理状态消息（ok/error）。
return_status = true

[IdleTrigger]
enabled = false
# 是否启用闲置自动触发功能。
start_delay = 1200.0
# 开始检测触发的闲置时间阈值（秒）。用户闲置超过此时间后才会开始触发检测。
probability = 0.01
# 每秒触发的概率（0.0-1.0）。例如 0.05 表示每秒有 5% 的概率触发。
min_triggers = 3
# 至少触发次数。保证在长时间闲置期间必定会触发一定次数。
# 此项会暂时绕过probability的限制。
prompt = The user has been idle for a while. Say something brief to check on them or start a casual conversation.
# 预设的触发文本。当闲置触发时，会将此文本作为 user question 发送给 LLM。
